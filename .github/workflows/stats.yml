name: Update GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare assets directory
        run: mkdir -p assets

      - name: Generate GitHub Stats SVG
        run: |
          curl -sL "https://github-stats-extended.vercel.app/api?username=FalconLD&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=false" \
            -o assets/github-stats.svg

      - name: Generate Top Languages SVG
        run: |
          curl -sL "https://github-stats-extended.vercel.app/api/top-langs/?username=FalconLD&layout=compact&theme=tokyonight&hide_border=true&langs_count=8" \
            -o assets/top-langs.svg

      - name: Generate Streak Stats SVG
        run: |
          curl -sL "https://streak-stats.demolab.com?user=FalconLD&theme=tokyonight&hide_border=true" \
            -o assets/streak-stats.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update GitHub stats SVGs"
          git push
